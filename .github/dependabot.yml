version: 2
updates:
  # GitHub Actions used by our workflows (spec-lint, api-diff, release-please).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
    groups:
      # Collapse routine patch/minor bumps into one PR to cut review noise;
      # majors still open individually so breaking changes get scrutiny.
      actions-minor:
        update-types:
          - minor
          - patch
